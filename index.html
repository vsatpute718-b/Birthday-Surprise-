<!DOCTYPE html>
<html>
<head>
<title>Birthday Wish </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ff69b4;
font-family:Arial;
flex-direction:column;
}

h1{
color:white;
}

#cake{
font-size:120px;
}  
#cakeArea{
    position:relative;
    width:300px;
    height:220px;
    margin:20px auto;
}

#knife{
    position:absolute;
    top:10px;
    left:10px;
    font-size:60px;
    cursor:grab;
    user-select:none;
    touch-action:none;
}
</style>
</head>
<audio id="birthdaySong">
  <source src="birthday.mp3" type="audio/mpeg">
</audio>
<body>

<h1>Happy Birthday Payal </h1>

<div id="cakeArea">
    <div id="cake">🎂</div>
    <div id="knife">🔪</div>
</div>
<script>

const knife = document.getElementById("knife");
const cake = document.getElementById("cake");

let dragging = false;
let cutDone = false;

knife.addEventListener("pointerdown", () => {
    dragging = true;
});

document.addEventListener("pointerup", () => {
    dragging = false;
});

document.addEventListener("pointermove", (e) => {

    if (!dragging || cutDone) return;

    const area = document.getElementById("cakeArea").getBoundingClientRect();

    let x = e.clientX - area.left;
    let y = e.clientY - area.top;

    knife.style.left = x + "px";
    knife.style.top = y + "px";

    // Cut when the knife reaches the middle of the cake
    if (x > 120 && x < 190 && y > 60) {

        cutDone = true;

        cake.innerHTML = "🍰";

        document.getElementById("birthdaySong").play();

alert("🎉 Cake Cut Successfully!");

setTimeout(() => {
    alert("🎂 Happy Birthday Payal! ❤️🎉");
}, 1000);

    }

});

</script>
</body>
</html>
