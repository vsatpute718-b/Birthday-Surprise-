<!DOCTYPE html>
<html>
<head>
<title>Birthday Wish </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ff69b4;
font-family:Arial;
flex-direction:column;
}

h1{
color:white;
}

#cake{
font-size:120px;
}  
#cakeArea{
    position:relative;
    width:300px;
    height:220px;
    margin:20px auto;
}

#knife{
    position:absolute;
    top:10px;
    left:10px;
    font-size:60px;
    cursor:grab;
    user-select:none;
    touch-action:none;
}
</style>
</head>

<body>

<h1>Happy Birthday Payal </h1>

<div id="cakeArea">
    <div id="cake">🎂</div>
    <div id="knife">🔪</div>
</div>

</body>
</html>
