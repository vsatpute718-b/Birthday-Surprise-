<!DOCTYPE html>
<html>
<head>
<title>Birthday Wish</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ff69b4;
    font-family:Arial;
    flex-direction:column;
}

h1{
    color:white;
}

#cake{
    font-size:120px;
}
#cakeArea{
    position:relative;
    width:300px;
    height:220px;
    margin:20px auto;
}

#knife{
    position:absolute;
    top:10px;
    left:10px;
    font-size:60px;
    cursor:grab;
    user-select:none;
    touch-action:none;
}

#blowBtn{
    font-size:20px;
    padding:10px 20px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    margin-top:10px;
}

#message{
    color:white;
    font-size:24px;
    margin-top:20px;
    min-height:30px;
    font-weight:bold;
    text-align:center;
    padding:0 20px;
}
</style>
</head>
<body>
<h1>Happy Birthday Payal</h1>

<div id="cakeArea">
    <div id="cake">🎂</div>
    <div id="knife">🔪</div>
</div>

<button id="blowBtn">🕯️ Blow Out Candles</button>

<div id="message"></div>

<audio id="birthdaySong">
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

const knife = document.getElementById("knife");
const cake = document.getElementById("cake");
const blowBtn = document.getElementById("blowBtn");
const song = document.getElementById("birthdaySong");
const message = document.getElementById("message");

let dragging = false;
let cutDone = false;

blowBtn.addEventListener("click", () => {
    cake.innerHTML = "🎂";
    song.play();
    message.innerText = "🕯️ Candles Blown Out! Now cut the cake!";
});

knife.addEventListener("pointerdown", () => {
    dragging = true;
});

document.addEventListener("pointerup", () => {
    dragging = false;
});

document.addEventListener("pointermove", (e) => {

    if (!dragging || cutDone) return;

    const area = document.getElementById("cakeArea").getBoundingClientRect();

    let x = e.clientX - area.left;
    let y = e.clientY - area.top;

    knife.style.left = x + "px";
    knife.style.top = y + "px";

    // Cut when the knife reaches the middle of the cake
    if (x > 120 && x < 190 && y > 60) {

        cutDone = true;

        cake.innerHTML = "🍰";

        song.play();

        message.innerText = "🎉 Cake Cut Successfully!";

        setTimeout(() => {
            message.innerText = "🎂 Happy Birthday Payal! ❤️🎉";
        }, 1000);
    }

});

</script>
</body>
</html>
