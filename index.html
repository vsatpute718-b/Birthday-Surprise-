<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4fa3,#ff7eb3);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
color:white;
}

h1{
font-size:42px;
margin-bottom:20px;
text-shadow:2px 2px 8px black;
}

#cakeArea{
position:relative;
width:320px;
height:240px;
margin:auto;
}

#cake{
font-size:150px;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
transition:.5s;
}

#knife{
position:absolute;
top:10px;
left:10px;
font-size:60px;
cursor:grab;
user-select:none;
touch-action:none;
}

button{
padding:15px 28px;
font-size:18px;
margin-top:20px;
border:none;
border-radius:40px;
background:#ff9800;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ff6f00;
}

#message{
display:none;
font-size:32px;
margin-top:20px;
font-weight:bold;
animation:pop 1s infinite alternate;
}

@keyframes pop{

from{
transform:scale(1);
}

to{
transform:scale(1.08);
}

}

.balloon{
position:absolute;
bottom:-120px;
font-size:40px;
animation:float 10s linear infinite;
}

@keyframes float{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-120vh);
}

}
.confetti{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 4s linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-20px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

.firework{
position:fixed;
font-size:35px;
animation:boom 1.5s ease-out forwards;
pointer-events:none;
}

@keyframes boom{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:scale(3);
opacity:0;
}
}
 .heart{
position:fixed;
bottom:-30px;
font-size:30px;
animation:heartUp 6s linear forwards;
pointer-events:none;
}

@keyframes heartUp{
0%{
transform:translateY(0) scale(0.5);
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}  
#slideshow{
margin:20px;
}

#photo{
width:220px;
height:220px;
border-radius:20px;
object-fit:cover;
border:5px solid white;
box-shadow:0 0 20px white;
transition:1s;
} 
</style>
</head>

<body>

<div class="container">
 <h1 id="title" style="display:none;">🎉 Happy Birthday Payal 🎉</h1>
 <div id="slideshow" style="display:none;">
    <img id="photo" src="payal.jpg">
 </div>
<div id="cakeArea">

<div id="cake">🎂</div>

<div id="knife">🔪</div>

</div>

<button id="blowBtn">
🕯️ Blow Out Candles
</button>

<div id="message">
🎉 Happy Birthday Payal ❤️
</div>

<audio id="birthdaySong">
<source src="birthday.mp3" type="audio/mpeg">
</audio>
<script>

const knife = document.getElementById("knife");
const cake = document.getElementById("cake");
const blowBtn = document.getElementById("blowBtn");
const song = document.getElementById("birthdaySong");
const message = document.getElementById("message");

let dragging = false;
let cutDone = false;

// Blow out candles
blowBtn.addEventListener("click", function(){

    blowBtn.innerHTML = "🎵 Music Playing...";
    song.play();

    alert("🕯️ Candles Blown Out!\nNow drag the knife to cut the cake.");

});

// Start dragging
knife.addEventListener("pointerdown", function(){

    dragging = true;

});

// Stop dragging
document.addEventListener("pointerup", function(){

    dragging = false;

});

// Move knife
document.addEventListener("pointermove", function(e){

    if(!dragging || cutDone) return;

    const area = document.getElementById("cakeArea").getBoundingClientRect();

    let x = e.clientX - area.left;
    let y = e.clientY - area.top;

    knife.style.left = x + "px";
    knife.style.top = y + "px";

    // Cake cut
    if(x > 150){

        cutDone = true;
       cake.innerHTML = "🍰";
   document.getElementById("title").style.display = "block";
document.getElementById("slideshow").style.display = "block";
message.style.display = "block";

message.innerHTML = "🎉 Happy Birthday Payal ❤️🎂<br>Wishing You a Wonderful Life!";

createBalloons();
createConfetti();
createFireworks();
createHearts();
    }

});

// Balloons
function createBalloons(){

    for(let i=0;i<25;i++){

        let b = document.createElement("div");

        b.className = "balloon";

        b.innerHTML = "🎈";

        b.style.left = Math.random()*100 + "vw";

        b.style.animationDuration = (5 + Math.random()*5) + "s";

        document.body.appendChild(b);

    }

}
function createConfetti(){

const items=["🎉","🎊","✨","💖","⭐"];

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=items[Math.floor(Math.random()*items.length)];

c.style.left=Math.random()*100+"vw";

c.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(c);

}

}

function createFireworks(){

for(let i=0;i<15;i++){

let f=document.createElement("div");

f.className="firework";

f.innerHTML="🎆";

f.style.left=Math.random()*100+"vw";

f.style.top=Math.random()*60+"vh";

document.body.appendChild(f);

}

}
function createHearts(){

for(let i=0;i<30;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(h);

}
}
const photos=[
"payal1.jpg",
"payal2.jpg",
"payal3.jpg",
"payal4.jpg",
"payal5.jpg"
];

let currentPhoto=0;

setInterval(function(){

currentPhoto++;

if(currentPhoto>=photos.length){

currentPhoto=0;

}

document.getElementById("photo").src=photos[currentPhoto];

},3000); 
</script>

</body>
</html>
